<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Dashboard</h1>
  <div class="cards">
    <div class="card" id="card-revenue">
      <h3>Revenue</h3>
      <div class="stat-val" id="stat-val1">0</div>
      <button id="stat-inc1">+1</button>
    </div>
    <div class="card" id="card-users">
      <h3>Users</h3>
      <div class="stat-val" id="stat-val2">0</div>
      <button id="stat-inc2">+1</button>
    </div>
    <div class="card" id="card-orders">
      <h3>Orders</h3>
      <div class="stat-val" id="stat-val3">0</div>
      <button id="stat-inc3">+1</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
