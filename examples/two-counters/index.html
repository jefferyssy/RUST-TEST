<!DOCTYPE html>
<html>
<head>
  <title>Two Counters</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Two Counters</h1>
  <div class="counters">
    <div class="counter" id="counter-a">
      <h2>Counter A</h2>
      <div class="display-a">0</div>
      <div class="buttons">
        <button id="inc-a">+1</button>
        <button id="reset-a">Reset</button>
      </div>
    </div>
    <div class="counter" id="counter-b">
      <h2>Counter B</h2>
      <div class="display-b">0</div>
      <div class="buttons">
        <button id="inc-b">+1</button>
        <button id="reset-b">Reset</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
